services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: tpln
      POSTGRES_PASSWORD: tpln_dev
      POSTGRES_DB: tpln
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tpln -d tpln"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.6
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: master_key_dev
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data

volumes:
  postgres_data:
  meilisearch_data:
